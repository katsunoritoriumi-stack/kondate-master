<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立マスター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --rose:#F4A4B0;--rose-light:#FCE8EC;--rose-dark:#C96A7E;
  --cream:#FDF6EE;--warm:#F7E8D4;--gold:#D4956A;--gold-light:#FAF0E6;
  --sage:#8BAF85;--sage-light:#EAF2E9;
  --text-main:#3D2A2A;--text-soft:#8C6B6B;--text-hint:#BBA0A0;
}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--cream);min-height:100vh;}
.app{max-width:600px;margin:0 auto;background:var(--cream);padding-bottom:3rem;}
.header{background:linear-gradient(145deg,#FDE8EE 0%,#FDF0E0 50%,#EDF5EC 100%);padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid rgba(212,149,106,.2);text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(244,164,176,.25) 0%,transparent 70%);border-radius:50%;}
.history-icon-btn{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.7);border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;z-index:2;}
.history-icon-btn:hover{background:white;transform:scale(1.05);}
.history-badge{position:absolute;top:-2px;right:-2px;background:var(--rose-dark);color:white;font-size:10px;min-width:18px;height:18px;border-radius:9px;padding:0 5px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.logo{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:600;color:var(--text-main);letter-spacing:.08em;display:flex;align-items:center;justify-content:center;gap:10px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--rose),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.tagline{font-size:12px;color:var(--text-soft);margin-top:6px;letter-spacing:.1em;}
.main{padding:1.5rem;}
.section-label{font-size:11px;font-weight:700;color:var(--rose-dark);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.75rem;display:flex;align-items:center;gap:6px;}
.section-label::before{content:'';width:16px;height:2px;background:var(--rose);border-radius:2px;}
.section-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
.section-label-row .section-label{margin-bottom:0;}
.back-btn{background:transparent;border:1px solid rgba(244,164,176,.4);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--rose-dark);cursor:pointer;font-family:'Zen Maru Gothic',sans-serif;}
.back-btn:hover{background:var(--rose-light);}
.hidden{display:none!important;}
.voice-card{background:white;border-radius:20px;padding:1.5rem;border:1px solid rgba(244,164,176,.3);margin-bottom:1.25rem;box-shadow:0 2px 16px rgba(212,149,106,.08);}
.voice-center{display:flex;flex-direction:column;align-items:center;gap:.75rem;margin-bottom:1.25rem;}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--rose) 0%,var(--gold) 100%);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(244,164,176,.5);transition:transform .2s;font-size:32px;}
.mic-btn:hover{transform:scale(1.05);}
.mic-btn.recording{background:linear-gradient(135deg,#E85D7A 0%,#C9504A 100%);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(232,93,122,.5),0 0 0 0px rgba(232,93,122,.3);}50%{box-shadow:0 4px 20px rgba(232,93,122,.5),0 0 0 18px rgba(232,93,122,0);}}
.wave-bars{display:flex;align-items:center;gap:4px;height:28px;}
.wave-bar{width:5px;border-radius:3px;background:var(--rose);height:6px;}
.wave-bar.active{animation:wave .6s ease-in-out infinite;}
.wave-bar:nth-child(1){animation-delay:0s;}.wave-bar:nth-child(2){animation-delay:.1s;}.wave-bar:nth-child(3){animation-delay:.2s;}.wave-bar:nth-child(4){animation-delay:.1s;}.wave-bar:nth-child(5){animation-delay:0s;}
@keyframes wave{0%,100%{height:6px;}50%{height:24px;}}
.voice-status{font-size:13px;color:var(--text-soft);text-align:center;line-height:1.6;}
.voice-status.recording{color:#E85D7A;font-weight:500;}
.transcript-box{width:100%;background:var(--cream);border:1.5px solid rgba(244,164,176,.3);border-radius:12px;padding:.875rem 1rem;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;color:var(--text-main);resize:none;min-height:90px;outline:none;}
.transcript-box:focus{border-color:var(--rose);}
.transcript-box::placeholder{color:var(--text-hint);}
.servings-row{display:flex;align-items:center;gap:10px;margin-top:.75rem;padding:.5rem 0;}
.servings-label{font-size:13px;color:var(--text-soft);font-weight:500;}
.servings-select{flex:1;background:var(--cream);border:1.5px solid rgba(244,164,176,.3);border-radius:10px;padding:8px 12px;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;color:var(--text-main);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23C96A7E' d='M6 8L0 0h12z'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px;}
.servings-select:focus{border-color:var(--rose);}
.suggest-btn{width:100%;background:linear-gradient(135deg,var(--rose-dark) 0%,var(--gold) 100%);color:white;border:none;border-radius:14px;padding:1rem;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 16px rgba(201,106,126,.3);margin-top:.75rem;font-family:'Zen Maru Gothic',sans-serif;}
.suggest-btn:hover{opacity:.9;}
.suggest-btn:disabled{opacity:.45;cursor:not-allowed;}
.chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem;}
.chip{background:white;border:1px solid rgba(244,164,176,.4);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--text-soft);cursor:pointer;transition:all .15s;font-family:'Zen Maru Gothic',sans-serif;}
.chip:hover,.chip.selected{background:var(--rose-light);border-color:var(--rose);color:var(--rose-dark);font-weight:500;}
.loading-area{text-align:center;padding:3rem 1rem;}
.loading-dots{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:1.25rem;}
.dot{width:12px;height:12px;background:var(--rose);border-radius:50%;animation:dotBounce 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;background:var(--gold);}
.dot:nth-child(3){animation-delay:.4s;background:var(--sage);}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.5;}50%{transform:translateY(-10px);opacity:1;}}
.loading-text{font-size:14px;color:var(--text-soft);}
.recipe-card{background:white;border-radius:20px;border:1px solid rgba(212,149,106,.2);overflow:hidden;margin-bottom:1rem;box-shadow:0 2px 20px rgba(212,149,106,.1);animation:fadeIn .5s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.recipe-header{background:linear-gradient(135deg,#FDE8EE 0%,#FDF0E0 100%);padding:1.5rem 1.5rem 1.25rem;border-bottom:1px solid rgba(244,164,176,.2);}
.recipe-emoji{font-size:64px;margin-bottom:10px;display:block;}
.recipe-name{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:600;color:var(--text-main);margin-bottom:6px;}
.recipe-subtitle{font-size:13px;color:var(--text-soft);}
.recipe-meta{display:flex;gap:1.25rem;padding:.875rem 1.5rem;background:var(--warm);border-bottom:1px solid rgba(244,164,176,.15);flex-wrap:wrap;}
.meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-soft);}
.recipe-body{padding:1.5rem;}
.recipe-section-title{font-size:14px;font-weight:700;color:var(--rose-dark);margin-bottom:.75rem;padding-bottom:5px;border-bottom:1.5px solid var(--rose-light);}
.ingredients-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem;}
.ingredient-item{background:var(--gold-light);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--text-main);display:flex;align-items:center;gap:7px;}
.ingredient-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;flex-shrink:0;}
.steps-list{list-style:none;}
.step-item{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;}
.step-num{width:26px;height:26px;background:linear-gradient(135deg,var(--rose),var(--gold));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;margin-top:2px;}
.step-text{font-size:14px;color:var(--text-main);line-height:1.75;}
.tip-box{background:var(--sage-light);border-left:3px solid var(--sage);border-radius:0 10px 10px 0;padding:12px 16px;margin-top:1.25rem;font-size:13px;color:#4A7045;line-height:1.7;}
.tip-label{font-weight:700;margin-bottom:4px;}
.reset-btn{width:100%;background:transparent;border:1.5px solid rgba(244,164,176,.5);border-radius:12px;padding:.8rem;font-size:14px;color:var(--rose-dark);cursor:pointer;margin-top:.75rem;font-family:'Zen Maru Gothic',sans-serif;}
.reset-btn:hover{background:var(--rose-light);}
.history-search{width:100%;background:white;border:1.5px solid rgba(244,164,176,.3);border-radius:12px;padding:10px 14px;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;outline:none;margin-bottom:1rem;}
.history-search:focus{border-color:var(--rose);}
.history-empty{text-align:center;padding:3rem 1rem;color:var(--text-soft);}
.history-empty-emoji{font-size:56px;margin-bottom:1rem;opacity:.6;}
.history-list{display:flex;flex-direction:column;gap:10px;}
.history-item{background:white;border-radius:14px;border:1px solid rgba(212,149,106,.2);padding:12px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:all .15s;box-shadow:0 1px 6px rgba(212,149,106,.08);}
.history-item:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(212,149,106,.15);border-color:var(--rose);}
.history-item-emoji{font-size:32px;width:50px;height:50px;background:linear-gradient(135deg,var(--rose-light),var(--gold-light));border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.history-item-body{flex:1;min-width:0;}
.history-item-name{font-size:14px;font-weight:700;color:var(--text-main);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item-date{font-size:11px;color:var(--text-soft);}
.history-item-delete{background:transparent;border:none;color:var(--text-hint);font-size:18px;cursor:pointer;padding:6px 10px;border-radius:6px;}
.history-item-delete:hover{background:var(--rose-light);color:var(--rose-dark);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="history-icon-btn" id="history-icon-btn" onclick="showHistory()">
      📚
      <span class="history-badge hidden" id="history-badge">0</span>
    </button>
    <div class="logo"><div class="logo-icon">🍳</div>献立マスター</div>
    <div class="tagline">話しかけるだけで、今夜の夕食が決まる</div>
  </div>
  <div class="main">

    <div id="input-section">
      <div class="section-label">食材・気分を教えて</div>
      <div class="voice-card">
        <div class="voice-center">
          <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">🎤</button>
          <div class="wave-bars">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
          </div>
          <div class="voice-status" id="voice-status">🎤 マイクを押して話しかけてね<br>（テキスト直接入力でもOK）</div>
        </div>
        <textarea class="transcript-box" id="transcript-box"
          placeholder="例：鶏肉と卵があって、あっさりしたものが食べたい"
          oninput="checkInput()"></textarea>
        <div class="servings-row">
          <label class="servings-label" for="servings-select">👥 何人前？</label>
          <select class="servings-select" id="servings-select">
            <option value="1人分">1人分</option>
            <option value="2人分" selected>2人分</option>
            <option value="3人分">3人分</option>
            <option value="4人分">4人分</option>
            <option value="5人分">5人分</option>
            <option value="6人分">6人分</option>
            <option value="8人分">8人分</option>
            <option value="10人分">10人分</option>
          </select>
        </div>
        <button class="suggest-btn" id="suggest-btn" onclick="suggestRecipe()" disabled>✨ レシピを提案してもらう</button>
      </div>

      <div class="section-label">よく使うフレーズ</div>
      <div class="chips-row">
        <span class="chip" onclick="addChip(this,'冷蔵庫の残り野菜で')">🥦 冷蔵庫の残り野菜で</span>
        <span class="chip" onclick="addChip(this,'時短で作れる')">⏱ 時短で作れる</span>
        <span class="chip" onclick="addChip(this,'ヘルシーに食べたい')">🌿 ヘルシーに</span>
        <span class="chip" onclick="addChip(this,'こってり食べたい気分')">🍖 こってり気分</span>
        <span class="chip" onclick="addChip(this,'映えるおしゃれな料理')">📸 映えるおしゃれ</span>
        <span class="chip" onclick="addChip(this,'子どもも喜ぶ')">👧 子どもも喜ぶ</span>
        <span class="chip" onclick="addChip(this,'お酒に合うおつまみ')">🍷 おつまみに</span>
        <span class="chip" onclick="addChip(this,'スープや鍋料理')">🍲 スープ・鍋</span>
      </div>
    </div>

    <div id="loading-section" class="loading-area hidden">
      <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="loading-text" id="loading-text">食材を分析しています…</div>
    </div>

    <div id="result-section" class="hidden"></div>

    <div id="history-section" class="hidden">
      <div class="section-label-row">
        <div class="section-label">レシピ履歴</div>
        <button class="back-btn" onclick="hideHistory()">← 戻る</button>
      </div>
      <input class="history-search" id="history-search" placeholder="🔍 料理名やキーワードで検索" oninput="renderHistory()" />
      <div id="history-content"></div>
    </div>
  </div>
</div>

<script>
const HISTORY_KEY='kendate_master_history';
const loadingMsgs=["食材を分析しています…","レシピ帳を検索中…","とびきりおいしい組み合わせを考え中…","もうすぐできます！"];
let recognition=null, isRecording=false;
let loadingIdx=0, loadingTimer=null;

window.addEventListener('DOMContentLoaded', () => {
  updateHistoryBadge();
  checkInput();
});

function checkInput() {
  const val = document.getElementById('transcript-box').value.trim();
  document.getElementById('suggest-btn').disabled = val.length === 0;
}

function addChip(el, text) {
  el.classList.toggle('selected');
  const box = document.getElementById('transcript-box');
  box.value = el.classList.contains('selected')
    ? (box.value + (box.value ? '、' : '') + text).trim()
    : box.value.replace('、'+text,'').replace(text+'、','').replace(text,'').trim();
  checkInput();
}

function toggleRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('このブラウザは音声入力に対応していません。\nChromeブラウザをお使いください。');
    return;
  }
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('voice-status').textContent = '👂 聞いています… 話し終わったらもう一度押してね';
    document.getElementById('voice-status').classList.add('recording');
    document.querySelectorAll('.wave-bar').forEach(b => b.classList.add('active'));
  };
  recognition.onresult = (e) => {
    let t = '';
    for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('transcript-box').value = t;
    checkInput();
  };
  recognition.onend = () => { if (isRecording) recognition.start(); };
  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') alert('マイクへのアクセスが許可されていません。');
    stopRecording();
  };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').textContent = '🎤';
  document.getElementById('voice-status').innerHTML = '🎤 マイクを押して話しかけてね<br>（テキスト直接入力でもOK）';
  document.getElementById('voice-status').classList.remove('recording');
  document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('active'));
}

async function suggestRecipe() {
  const input = document.getElementById('transcript-box').value.trim();
  const servings = document.getElementById('servings-select').value;
  if (!input) return;
  document.getElementById('input-section').classList.add('hidden');
  document.getElementById('loading-section').classList.remove('hidden');
  document.getElementById('result-section').classList.add('hidden');
  loadingIdx = 0;
  document.getElementById('loading-text').textContent = loadingMsgs[0];
  loadingTimer = setInterval(() => {
    loadingIdx = (loadingIdx+1) % loadingMsgs.length;
    document.getElementById('loading-text').textContent = loadingMsgs[loadingIdx];
  }, 1800);

  try {
    const res = await fetch('/api/recipe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input, servings })
    });
    clearInterval(loadingTimer);
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'エラーが発生しました'); return; }
    addToHistory(data.recipe, input);
    showRecipe(data.recipe, true);
  } catch(e) {
    clearInterval(loadingTimer);
    showError('通信エラーが発生しました: ' + e.message);
  }
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function saveHistory(arr) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
  updateHistoryBadge();
}
function addToHistory(recipe, userInput) {
  const arr = loadHistory();
  arr.unshift({ id: Date.now(), date: new Date().toISOString(), userInput, recipe });
  saveHistory(arr);
}
function deleteHistoryItem(id, e) {
  e.stopPropagation();
  if (!confirm('このレシピを削除しますか？')) return;
  saveHistory(loadHistory().filter(item => item.id !== id));
  renderHistory();
}
function updateHistoryBadge() {
  const arr = loadHistory();
  const badge = document.getElementById('history-badge');
  if (arr.length > 0) { badge.textContent = arr.length > 99 ? '99+' : arr.length; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}
function showHistory() {
  document.getElementById('input-section').classList.add('hidden');
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('loading-section').classList.add('hidden');
  document.getElementById('history-section').classList.remove('hidden');
  document.getElementById('history-search').value = '';
  renderHistory();
}
function hideHistory() {
  document.getElementById('history-section').classList.add('hidden');
  document.getElementById('input-section').classList.remove('hidden');
}
function renderHistory() {
  const query = document.getElementById('history-search').value.trim().toLowerCase();
  const arr = loadHistory();
  const filtered = query ? arr.filter(item => {
    const r = item.recipe;
    return [r.name, r.subtitle, item.userInput, (r.ingredients||[]).join(' ')].join(' ').toLowerCase().includes(query);
  }) : arr;
  const content = document.getElementById('history-content');
  if (filtered.length === 0) {
    content.innerHTML = `<div class="history-empty"><div class="history-empty-emoji">${query ? '🔍' : '📭'}</div><div style="font-size:14px;font-weight:700;color:var(--text-main);margin-bottom:6px;">${query ? '見つかりませんでした' : 'まだ履歴がありません'}</div><div style="font-size:12px;">${query ? '別のキーワードを試してください' : 'レシピを提案してもらうとここに保存されます'}</div></div>`;
    return;
  }
  content.innerHTML = '<div class="history-list">' + filtered.map(item => {
    const r = item.recipe;
    const d = new Date(item.date);
    const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="history-item" onclick="openHistoryItem(${item.id})"><div class="history-item-emoji">${r.emoji||'🍽'}</div><div class="history-item-body"><div class="history-item-name">${r.name||'レシピ'}</div><div class="history-item-date">${dateStr}</div></div><button class="history-item-delete" onclick="deleteHistoryItem(${item.id},event)">🗑</button></div>`;
  }).join('') + '</div>';
}
function openHistoryItem(id) {
  const item = loadHistory().find(i => i.id === id);
  if (!item) return;
  document.getElementById('history-section').classList.add('hidden');
  showRecipe(item.recipe, false);
}

function showRecipe(r, isNew) {
  document.getElementById('loading-section').classList.add('hidden');
  document.getElementById('input-section').classList.add('hidden');
  const section = document.getElementById('result-section');
  section.classList.remove('hidden');
  const stepsHTML = (r.steps||[]).map((s,i) =>
    `<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></li>`
  ).join('');
  const ingHTML = (r.ingredients||[]).map(ig =>
    `<div class="ingredient-item"><span class="ingredient-dot"></span>${ig}</div>`
  ).join('');
  section.innerHTML = `
    <div class="section-label-row">
      <div class="section-label">${isNew ? '今夜のおすすめレシピ' : '保存されたレシピ'}</div>
      <button class="back-btn" onclick="resetApp()">← トップへ</button>
    </div>
    <div class="recipe-card">
      <div class="recipe-header">
        <span class="recipe-emoji">${r.emoji||'🍽'}</span>
        <div class="recipe-name">${r.name||'おすすめ料理'}</div>
        <div class="recipe-subtitle">${r.subtitle||''}</div>
      </div>
      <div class="recipe-meta">
        <div class="meta-item">⏱ ${r.time||'約20分'}</div>
        <div class="meta-item">⭐ ${r.difficulty||'ふつう'}</div>
        <div class="meta-item">👥 ${r.servings||'2人分'}</div>
      </div>
      <div class="recipe-body">
        <div class="recipe-section-title">🧺 材料</div>
        <div class="ingredients-grid">${ingHTML}</div>
        <div class="recipe-section-title">📋 作り方</div>
        <ol class="steps-list">${stepsHTML}</ol>
        ${r.tip?`<div class="tip-box"><div class="tip-label">💡 コツ</div>${r.tip}</div>`:''}
      </div>
    </div>
    <button class="reset-btn" onclick="resetApp()">← 別のレシピを探す</button>`;
}

function showError(msg) {
  clearInterval(loadingTimer);
  document.getElementById('loading-section').classList.add('hidden');
  const section = document.getElementById('result-section');
  section.classList.remove('hidden');
  section.innerHTML = `<div class="recipe-card" style="padding:1.5rem;"><div style="font-size:40px;margin-bottom:.75rem;text-align:center;">😢</div><div style="font-size:16px;color:#3D2A2A;margin-bottom:1rem;font-weight:700;text-align:center;">レシピの取得に失敗しました</div><div style="font-size:12px;color:#8C6B6B;margin-bottom:1.25rem;line-height:1.8;background:#FCE8EC;padding:12px;border-radius:8px;">${msg}</div><button class="reset-btn" onclick="resetApp()">← やり直す</button></div>`;
}

function resetApp() {
  ['result-section','loading-section','history-section'].forEach(id => document.getElementById(id).classList.add('hidden'));
  document.getElementById('input-section').classList.remove('hidden');
  document.getElementById('transcript-box').value = '';
  checkInput();
  document.querySelectorAll('.chip.selected').forEach(c => c.classList.remove('selected'));
}
</script>
</body>
</html>
